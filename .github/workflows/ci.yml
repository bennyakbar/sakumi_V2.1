name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sakumi_test
          POSTGRES_USER: sakumi
          POSTGRES_PASSWORD: sakumi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sakumi -d sakumi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql
          coverage: none

      - name: Validate composer files
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run Pint
        run: ./vendor/bin/pint --test

      - name: Assert CI database safety
        env:
          DB_HOST: 127.0.0.1
          DB_SAKUMI_MODE: real
        run: |
          # Ensure CI never accidentally connects to a production database.
          # DB_HOST must be a local/container address, never a remote host.
          SAFE_HOSTS="127.0.0.1 localhost postgres"
          if ! echo "$SAFE_HOSTS" | grep -qw "$DB_HOST"; then
            echo "::error::SAFETY VIOLATION: DB_HOST='$DB_HOST' is not a safe CI host ($SAFE_HOSTS)"
            exit 1
          fi
          # Ensure no .env file contains real production credentials
          if grep -qE 'DB_REAL_PASSWORD=.+' .env 2>/dev/null; then
            PASS_VALUE=$(grep 'DB_REAL_PASSWORD=' .env | cut -d'=' -f2-)
            if [ -n "$PASS_VALUE" ]; then
              echo "::error::SAFETY VIOLATION: .env contains non-empty DB_REAL_PASSWORD"
              exit 1
            fi
          fi
          echo "CI database safety checks passed."

      - name: Run tests
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: sakumi_test
          DB_USERNAME: sakumi
          DB_PASSWORD: sakumi
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
          DB_SAKUMI_MODE: real 
        run: php artisan test --without-tty
